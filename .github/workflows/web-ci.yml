name: Web Demo CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check JavaScript syntax
        run: node --check app.js
      - name: Check required PWA files
        run: test -f index.html && test -f app.js && test -f manifest.webmanifest && test -f sw.js
